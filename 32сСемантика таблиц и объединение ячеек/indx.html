<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Таблицы</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<table>
			<caption>
				Статистика игроков
			</caption>
			<thead>
				<tr>
					<th>Имя</th>
					<th>Колличество очков</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td colspan="2">Игрок1</td>
				</tr>
				<tr>
					<td>Игрок2</td>
					<td>123</td>
				</tr>
			</tbody>
			<tfoot>
				<tr>
					<td>Общее</td>
					<td>246</td>
				</tr>
			</tfoot>
		</table>

		<table>
			<tr>
				<td rowspan="2">Большая ячейка</td>
				<td>Маленькая ячейка</td>
			</tr>
			<tr>
				<td>Маленькая ячейка</td>
			</tr>
			<tr>
				<td>еще ячейка</td>
				<td>и ещ одна</td>
			</tr>
		</table>
	</body>
</html>
